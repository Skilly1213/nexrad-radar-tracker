<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXRAD Radar Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
    <script>
        // Initialize the map
        var map = L.map('map').setView([35.0456, -85.3097], 10); // Centered on Chattanooga

        // Load and display tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        // Function to add radar overlay (you will need to provide the radar data URL)
        // Example: var radarLayer = L.tileLayer('https://example.com/radar/{z}/{x}/{y}.png').addTo(map);

        // Example radar data overlay (uncomment and replace URL)
        // var radarLayer = L.tileLayer('https://your-radar-data-url/{z}/{x}/{y}.png').addTo(map);
    </script>
</body>
</html>
